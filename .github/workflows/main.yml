name: EEX Scraper Scheduled

on:
  schedule:
    # 08h30 France (UTC+1 → 07h30 UTC)
    - cron: '30 7 * * 1-5'

    # 18h00 France (UTC+1 → 17h00 UTC)
    - cron: '0 17 * * 1-5'

  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      GitHub__Token: ${{ secrets.EEX_WEBSCRAPING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Run
        run: dotnet run --project WebScrapingHub/WebScrapingHub.csproj --configuration Release
